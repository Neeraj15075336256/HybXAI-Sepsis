name: hybxai-sepsis
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── Core scientific stack ─────────────────────────────────
  - numpy=1.26.4
  - pandas=2.2.1
  - scipy=1.13.0

  # ── Deep learning (CPU build by default) ─────────────────
  # For GPU: replace pytorch-cpu with pytorch and add cudatoolkit=11.8
  - pytorch=2.1.0
  - torchvision=0.16.0
  - cpuonly                   # remove this line for GPU support

  # ── Visualisation ─────────────────────────────────────────
  - matplotlib=3.8.4
  - seaborn=0.13.2

  # ── Notebook ──────────────────────────────────────────────
  - jupyter=1.0.0
  - ipykernel=6.29.4
  - tqdm=4.66.2

  # ── Pip-only packages ─────────────────────────────────────
  - pip:
    - scikit-learn==1.4.2
    - xgboost==2.0.3
    - lightgbm==4.3.0
    - imbalanced-learn==0.12.2
    - joblib==1.3.2
    - shap==0.45.0
    - lime==0.2.0.1
    - plotly==5.21.0
    - nbformat==5.10.4
